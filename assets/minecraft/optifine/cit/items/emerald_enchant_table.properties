# Regle OptiFine CIT pour l'item CustomItem EMERALD_ENCHANT_TABLE (Bela-Customs).
# La texture est selectionnee via le NBT CustomItemId ecrit par NBTEditor,
# PAS via la Damage Value (voir custom-items.yml). Attention : la cle est
# nbt.CustomItemId, jamais nbt.tag.CustomItemId (segment .tag. en trop).
#
# Bloc de reference (base material matche par la regle) : Prismarine:2
# (Dark Prismarine), a la place du Bloc d'Emeraude utilise auparavant.
type=item
items=prismarine
damage=2
nbt.CustomItemId=EMERALD_ENCHANT_TABLE
texture=emerald_enchant_table
