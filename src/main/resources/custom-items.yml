# =====================================================
#  Bela-Customs - custom-items.yml
#  Statistiques des Custom Items (tier Émeraude / Émeraude Renforcé) et
#  mapping de textures (resource pack 1.8).
# =====================================================

stats:
  hammer:
    emerald.radius: 1
    reinforced.radius: 2
  shovel:
    emerald.radius: 1
    reinforced.radius: 2
  hoe:
    emerald.radius: 0
    reinforced.radius: 1
  axe:
    # Longueur de la colonne coupée par la Hache Émeraude (bloc visé inclus).
    emerald.length: 3
  sword:
    # Bonus de dégâts (points de cœur, 1.0 = un demi cœur) par rapport à une épée diamant.
    emerald.bonus-damage: 3.0
    reinforced.bonus-damage: 5.0
  armor:
    # Réduction de dégâts supplémentaire (pourcentage, 0.05 = 5%) par pièce d'armure équipée.
    emerald.reduction-per-piece: 0.05
    reinforced.reduction-per-piece: 0.08

# ---------------------------------------------------------------------------
# Association identifiant interne (le même que le NBT CustomItemId et que
# /citem give <id>) -> Material vanilla de base.
#
# ATTENTION (depuis la correction de durabilité) : le champ "durability"
# ci-dessous n'est PLUS utilisé pour l'affichage du resource pack. Il
# servait à l'ancienne technique "CustomModelData pré-1.13" (Damage Value
# = identifiant de texture), abandonnée car elle partageait le même slot
# NBT que la durabilité réelle de l'item et provoquait des items générés
# avec une durabilité négative (voir ItemBuilder.durability()). Le champ
# est conservé ici uniquement pour compatibilité de format, il est ignoré
# côté rendu.
#
# Le champ "material" reste utilisé (Material vanilla de base de l'item).
# La texture doit désormais être sélectionnée côté resource pack par une
# règle OptiFine CIT qui matche sur le NBT CustomItemId, PAS sur le
# Damage Value. Exemple pour EMERALD_HAMMER (assets/minecraft/optifine/cit/
# emerald_hammer.properties) :
#
#   type=item
#   items=diamond_pickaxe
#   nbt.CustomItemId=EMERALD_HAMMER
#   texture=emerald_hammer
#
# Attention à ne PAS écrire "nbt.tag.CustomItemId=..." (segment ".tag."
# en trop, la règle CIT ne matcherait jamais) : voir NBTEditor.CUSTOM_ID_KEY.
# ---------------------------------------------------------------------------
textures:
  EMERALD_HAMMER: {material: DIAMOND_PICKAXE, durability: 1001}
  REINFORCED_EMERALD_HAMMER: {material: DIAMOND_PICKAXE, durability: 1002}
  EMERALD_PICKAXE: {material: DIAMOND_PICKAXE, durability: 1003}
  REINFORCED_EMERALD_PICKAXE: {material: DIAMOND_PICKAXE, durability: 1004}
  EMERALD_SHOVEL: {material: DIAMOND_SPADE, durability: 1005}
  REINFORCED_EMERALD_SHOVEL: {material: DIAMOND_SPADE, durability: 1006}
  EMERALD_HOE: {material: DIAMOND_HOE, durability: 1007}
  REINFORCED_EMERALD_HOE: {material: DIAMOND_HOE, durability: 1008}
  EMERALD_AXE: {material: DIAMOND_AXE, durability: 1009}
  REINFORCED_EMERALD_AXE: {material: DIAMOND_AXE, durability: 1010}
  EMERALD_SWORD: {material: DIAMOND_SWORD, durability: 1011}
  REINFORCED_EMERALD_SWORD: {material: DIAMOND_SWORD, durability: 1012}
  EMERALD_HELMET: {material: DIAMOND_HELMET, durability: 1013}
  REINFORCED_EMERALD_HELMET: {material: DIAMOND_HELMET, durability: 1014}
  EMERALD_CHESTPLATE: {material: DIAMOND_CHESTPLATE, durability: 1015}
  REINFORCED_EMERALD_CHESTPLATE: {material: DIAMOND_CHESTPLATE, durability: 1016}
  EMERALD_LEGGINGS: {material: DIAMOND_LEGGINGS, durability: 1017}
  REINFORCED_EMERALD_LEGGINGS: {material: DIAMOND_LEGGINGS, durability: 1018}
  EMERALD_BOOTS: {material: DIAMOND_BOOTS, durability: 1019}
  REINFORCED_EMERALD_BOOTS: {material: DIAMOND_BOOTS, durability: 1020}

EMERALD_ENCHANT_TABLE: {material: EMERALD_BLOCK, durability: 1021}
EMERALD_ANVIL: {material: SEA_LANTERN, durability: 1022}
