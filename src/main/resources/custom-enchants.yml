# =====================================================
#  Bela-Customs - custom-enchants.yml
#  Réglages du système de Custom Enchants (Table d'Enchantement Émeraude,
#  Enclume Émeraude, Vein Miner).
# =====================================================

costs:
  # Table d'Enchantement Émeraude : niveaux requis pour enchanter un livre vierge.
  enchant-table: 60
  # Enclume Émeraude : niveaux requis pour combiner un item + un livre (prix fixe).
  emerald-anvil: 30

# Nombre de blocs maximum cassés en une seule fois par l'enchant Vein Miner
# (protection anti-lag).
vein-miner-max-blocks: 64
