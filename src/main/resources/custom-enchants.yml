# =====================================================
#  Bela-Customs - custom-enchants.yml
#  Réglages du système de Custom Enchants (Table d'Enchantement Émeraude,
#  Enclume Émeraude, Vein Miner).
# =====================================================

costs:
  # Table d'Enchantement Émeraude : niveaux requis pour enchanter un livre vierge.
  enchant-table: 60
  # Enclume Émeraude : niveaux requis pour combiner un item + un livre (prix fixe).
  emerald-anvil: 30
  # Enclume Émeraude : niveaux requis pour une réparation complète (coût fixe,
  # en plus des Blocs d'Émeraude normaux consommés, voir repair-max-blocks).
  emerald-anvil-repair: 30

# Nombre de blocs maximum cassés en une seule fois par l'enchant Vein Miner
# (protection anti-lag).
vein-miner-max-blocks: 64

# Système de réparation de l'Enclume Émeraude : nombre de Blocs d'Émeraude
# normaux nécessaires pour réparer un item au maximum de ses dégâts (durabilité
# presque à 0). Un item moins endommagé coûte proportionnellement moins de
# blocs (minimum 1 dès qu'il a subi le moindre dégât).
repair-max-blocks: 4

# Équilibrage PvP : nombre maximum de Custom Enchants qu'une pièce d'armure
# (casque/plastron/jambières/bottes) peut recevoir. Les armes et outils
# custom (épée, pioche, hache, pelle, houe) ne sont PAS concernés par cette
# limite : ils peuvent recevoir un nombre illimité de Custom Enchants.
max-armor-enchants: 3
