# =====================================================
#  Bela-Customs - config.yml
#  Réglages généraux, communs à tout le plugin.
#
#  Les réglages spécifiques aux Custom Enchants et Custom Items se trouvent
#  respectivement dans custom-enchants.yml et custom-items.yml.
# =====================================================

# Active/désactive la vérification des protections (Factions/WorldGuard/
# FactionsUUID/GriefPrevention/etc.) avant toute destruction automatique de
# bloc déclenchée par un custom item (hammer, pelle, tree capitator...).
protection.check-enabled: true

# Active les logs de debug supplémentaires dans la console du serveur.
debug: false
