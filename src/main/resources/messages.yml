    repair:
      wrong-currency: "&cSeuls les Blocs d'Émeraude normaux permettent de réparer (pas les Blocs Renforcés)."
      already-unbreakable: "&cCet item est déjà incassable (Unbreakable), rien à réparer."
      not-repairable: "&cCet item n'a pas de durabilité à réparer."
      already-full: "&cCet item est déjà à durabilité maximale."
      not-enough-blocks: "&cIl te faut &f%amount%&c Bloc(s) d'Émeraude pour réparer cet item."
      not-enough-levels: "&cIl te manque des niveaux ! (%cost% requis)"
      success: "&7Item réparé avec succès &7(&f%blocks%&7 Bloc(s) d'Émeraude utilisés)."

  blocks:
