  give-usage: "&cUsage: /citem give <joueur> <id> [quantité]"
  player-not-found: "&cJoueur introuvable ou hors ligne : %player%"
  invalid-amount: "&cQuantité invalide : %amount%"
  unknown-id: "&cIdentifiant de custom item inconnu : %id%"
  give-success-sender: "&aDonné %amount%x %id% à %player%."
  give-success-target: "&aVous avez reçu %amount%x %id%."
  list: "&7Custom items disponibles : &f%ids%"
  id-not-custom: "&7L'item en main n'est pas un custom item."
  id-result: "&7Identifiant : &f%id%"
  player-only-subcommand: "&cCette sous-commande n'est utilisable que par un joueur."

