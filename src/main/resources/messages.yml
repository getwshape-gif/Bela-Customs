  anvil-block-received: "&7Emerald Anvil reçue. Place-la puis clique-droit dessus."

  table:
    need-book: "&cPlace un livre vierge dans la case prévue."
    not-enough-levels: "&cIl te manque des niveaux ! (%cost% requis, tu en as %current%)"
    success: "&7Tu as obtenu &f&l%enchant%"

  anvil:
