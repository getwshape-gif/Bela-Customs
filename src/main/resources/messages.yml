# =====================================================
#  Bela-Customs - messages.yml
#  Tous les messages envoyes aux joueurs. Codes couleur "&".
#  Placeholders : %nom% (remplaces dynamiquement selon le contexte).
# =====================================================

prefix: "&8[&2Bela-Customs&8] &7"

player-only: "&cCette commande est réservée aux joueurs."
no-permission: "&cTu n'as pas la permission d'utiliser cette commande."
reload: "&aConfiguration de Bela-Customs rechargée."

enchants:
